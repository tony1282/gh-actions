name: Expresiones
run-name: Expresiones

on:
  push:
  workflow_dispatch:
    inputs:
      nombre:
        description: "Nombre de la persona"
        required: true
        default: "Antony"
      edad:
        description: "Edad de la persona"
        required: true
        default: "17"

jobs:
  execute-script-python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ejecutar script
        run: python condicionales.py
        env:
          USERNAME: ${{ github.event.inputs.nombre || 'Antony' }}
          EDAD: ${{ github.event.inputs.edad || '17' }}
